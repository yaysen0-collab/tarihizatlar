<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARİHİ ZATLAR</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #334155; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { padding: 12px 20px; border: none; border-radius: 12px; background: var(--primary); color: #0f172a; font-weight: bold; cursor: pointer; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #334155; color: #cbd5e1; padding: 10px 15px; border-radius: 10px; cursor: pointer; border: none; }
        .tab-btn.active { background: var(--primary); color: #0f172a; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .kisi-kart { background: var(--card); border: 1px solid #334155; padding: 15px; border-radius: 15px; margin-bottom: 10px; position: relative; }
        #loginScreen { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); display:none; justify-content:center; align-items:center; z-index:9999; }
        #adminPanel { display: none; }
        #openLogin { position: fixed; bottom: 10px; right: 10px; opacity: 0.5; background: none; color: white; border: none; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="card" style="width: 300px; text-align: center;">
            <h2 style="color:var(--primary)">Yönetici Girişi</h2>
            <input type="text" id="username" placeholder="Kullanıcı Adı">
            <input type="password" id="password" placeholder="Şifre">
            <button onclick="checkLogin()">Giriş Yap</button>
            <p onclick="closeLogin()" style="cursor:pointer; font-size:12px; margin-top:10px;">Vazgeç</p>
        </div>
    </div>

    <div class="container">
        <h1 style="text-align:center; color: var(--primary);">TARİHİ ZATLAR</h1>

        <div id="adminPanel" class="card">
            <h3 style="color:var(--primary)">🛠️ Yeni Kayıt</h3>
            <input id="isim" placeholder="İsim">
            <input id="aile" placeholder="Aile">
            <input id="dogum" placeholder="Doğum (Örn: 661)">
            <input id="vefat" placeholder="Vefat (Örn: 680)">
            <textarea id="bilgi" placeholder="Bilgi..." rows="3"></textarea>
            <button onclick="saveToCloud()">💾 KAYDET</button>
            <button onclick="location.reload()" style="background:#475569; color:white;">ÇIKIŞ</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('list', this)">📚 Arşiv</button>
            <button class="tab-btn" onclick="switchTab('soy', this)">🌳 Soy Ağacı</button>
        </div>

        <div id="list" class="tab-content active"><div id="listArea">Yükleniyor...</div></div>
        <div id="soy" class="tab-content"><div id="soyArea"></div></div>
    </div>

    <button id="openLogin" onclick="showLogin()">Giriş</button>

    <script>
        // FIREBASE BİLGİLERİNİ BURAYA DİKKATLİCE YAPIŞTIR
        const firebaseConfig = {
            apiKey: "AIzaSyCrrD1XRInE3Er47ZRl28rUo_Pk7FZAyss" , 
            authDomain: "tarihizatlar.firebaseapp.com" , 
            projectId: "tarihizatlar" , 
            storageBucket:  "tarihizatlar.firebasestorage.app" , 
            messagingSenderId: "930648787998" , 
            appId: "1:930648787998:web:db163d0f3811786610b20f" ,
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let isAdmin = false;

        function showLogin() { document.getElementById('loginScreen').style.display = 'flex'; }
        function closeLogin() { document.getElementById('loginScreen').style.display = 'none'; }
        
        function checkLogin() {
            if(document.getElementById('username').value === "ayris" && document.getElementById('password').value === "130504") {
                isAdmin = true;
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('openLogin').style.display = 'none';
                loadData();
            } else { alert("Hatalı!"); }
        }

        async function saveToCloud() {
            const isim = document.getElementById('isim').value;
            if(!isim) return;
            await db.collection("zatlar").add({
                isim: isim, aile: document.getElementById('aile').value || "Bilinmiyor",
                dogum: document.getElementById('dogum').value, vefat: document.getElementById('vefat').value,
                bilgi: document.getElementById('bilgi').value,
                "zaman damgası": Date.now() 
            });
            alert("Kaydedildi!");
        }

        function loadData() {
            // Hata veren "orderBy" kısmını sildim, böylece yükleniyor yazısı hemen gidecek
            db.collection("zatlar").onSnapshot((snapshot) => {
                const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render(data);
            });
        }

        function render(data) {
            const listArea = document.getElementById('listArea');
            const soyArea = document.getElementById('soyArea');
            listArea.innerHTML = ''; soyArea.innerHTML = '';

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'kisi-kart';
                card.innerHTML = `
                    <h2 style="margin:0; color:var(--primary)">${item.isim}</h2>
                    <p style="font-size:14px; color:#94a3b8;">${item.dogum} - ${item.vefat} | ${item.aile}</p>
                    <p>${item.bilgi}</p>
                    ${isAdmin ? `<button style="background:#ef4444; color:white; border:none; padding:5px; border-radius:5px;" onclick="deleteItem('${item.id}')">Sil</button>` : ''}
                `;
                listArea.appendChild(card);
            });

            // Soy Ağacı
            const aileler = {};
            data.forEach(i => { if(!aileler[i.aile]) aileler[i.aile] = []; aileler[i.aile].push(i.isim); });
            for(let a in aileler) {
                soyArea.innerHTML += `<div class="kisi-kart"><b style="color:var(--primary)">${a}:</b> ${aileler[a].join(", ")}</div>`;
            }
        }

        function deleteItem(id) { if(confirm("Silinsin mi?")) db.collection("zatlar").doc(id).delete(); }
        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        loadData();
    </script>
</body>
</html>
