<html lang="tr">
<head>

    <style>

        .container { max-width: 900px; margin: 20px auto; padding: 20px; }

        .admin-section { background: #e7e5e4; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .row { display: flex; gap: 10px; }
        .btn-action { background: #5d4037; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 5px; margin-top: 5px; }
        .admin-controls { margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .del-btn { background: #c62828; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        .edit-btn { background: #1565c0; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; margin-right: 5px; }
    </style>
</head>

<header>
    <h1>ASRI SAADET PORTALI</h1>
    <div>

        <button class="nav-btn" onclick="sayfaDegistir('arsiv')">Arşiv</button>
        <button class="nav-btn" onclick="sayfaDegistir('cizelge')">Çizelge</button>
        <button class="nav-btn" onclick="sayfaDegistir('soy')">Soyağacı</button>
    </div>
</header>

<div class="container">
    <div id="home" class="page active">

            <div class="card" onclick="sayfaDegistir('cizelge')">⏳<br>ÇİZELGE</div>
            <div class="card" onclick="sayfaDegistir('soy')">🌳<br>SOYAĞACI</div>
        </div>
        <div style="text-align: center; margin-top: 50px;">
            <button onclick="yoneticiGiris()" style="background: none; border: none; color: #999; cursor: pointer;">[ Yönetici Paneli ]</button>
        </div>
    </div>

    <div id="arsiv" class="page">
        <h2>📚 Kayıtlar</h2>
        <input type="text" id="ara" placeholder="Ara..." onkeyup="aramaYap()">
        <div id="arsivList"></div>
    </div>

    <div id="cizelge" class="page"><h2>⏳ Çizelge (Zaman Çizelgesi)</h2><div id="cizelgeList"></div></div>
    <div id="soy" class="page"><h2>🌳 Soyağacı</h2><div id="soyList"></div></div>

    <div id="admin" class="page">
        <h2>⚙️ Yönetim Paneli</h2>
        <div class="admin-section" style="border-left-color: #8d6e63;">
            <h3>📜 Yeni Olay Ekle</h3>
            <input id="ol_ad" placeholder="Olay İsmi">
            <div class="row">
                <input id="ol_hicri" placeholder="Olay Tarihi (Hicri)">
                <input id="ol_miladi" placeholder="Olay Tarihi (Miladi)">
            </div>
            <textarea id="ol_bilgi" placeholder="Olay Hakkında Bilgi" rows="2"></textarea>
            <button class="btn-action" onclick="olayKaydet()" style="background: #8d6e63;">OLAYI KAYDET</button>
        </div>
        <hr>
        <h2 id="form-baslik">⚙️ Zat Ekle / Düzenle</h2>
        <div class="admin-section">
            <input type="hidden" id="edit-id">
            <input id="in_ad" placeholder="İsim">
            <div class="row"><input id="in_anne" placeholder="Anne"><input id="in_baba" placeholder="Baba"></div>
            
            <input id="in_es" placeholder="Eşi / Eşleri">
            <input id="in_baglar" placeholder="Kardeş, Çocuk veya Diğer Bağlar">
            
            <div class="row">
                <input id="in_d_hicri" placeholder="Doğum Tarihi (Hicri)">
                <input id="in_d_miladi" placeholder="Doğum Tarihi (Miladi)">
            </div>
            <div class="row">
                <input id="in_v_hicri" placeholder="Vefat Tarihi (Hicri)">
                <input id="in_v_miladi" placeholder="Vefat Tarihi (Miladi)">
            </div>
            <textarea id="in_bilgi" placeholder="Bilgi" rows="3"></textarea>
            <button class="btn-action" id="main-btn" onclick="kaydet()">KAYDET</button>
            <button class="btn-action" id="cancel-btn" onclick="temizle()" style="background:#999; display:none;">İPTAL</button>
        </div>
        <hr>
        <h3>📋 Mevcut Kayıtlar</h3>
        <div id="adminList"></div>
    </div>
</div>
