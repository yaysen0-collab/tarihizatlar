<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARİHİ ZATLAR</title>
    <style>
        /* MODERN ARKA PLAN VE GENEL TASARIM */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a; /* Modern koyu lacivert/siyah tema */
            color: #f1f5f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-title {
            font-size: 3rem;
            font-weight: 800;
            color: #38bdf8; /* Parlak mavi */
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            margin-bottom: 30px;
            letter-spacing: 5px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
        }

        .card {
            background: #1e293b; /* Kart rengi */
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        /* FORM ELEMANLARI */
        input, select, textarea {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #0ea5e9;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #0284c7;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(14, 165, 233, 0.4);
        }

        /* SEKME (TAB) TASARIMI */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .tab-btn {
            background: #334155;
            color: #cbd5e1;
            border-radius: 12px;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: #38bdf8;
            color: #0f172a;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* İSİMLER LİSTESİ - TIKLAYINCA AÇILAN YAPI */
        .kisi-ozet {
            background: #334155;
            margin-bottom: 10px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #475569;
        }

        .kisi-baslik {
            padding: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #38bdf8;
        }

        .kisi-baslik:hover { background: #475569; }

        .kisi-detay {
            padding: 0 15px 15px 15px;
            display: none; /* Varsayılan olarak gizli */
            border-top: 1px solid #1e293b;
            font-size: 14px;
            line-height: 1.6;
            color: #e2e8f0;
        }
    </style>
</head>
<body>

    <div class="main-title">TARİHİ ZATLAR</div>

    <div class="container">
        <div class="card">
            <h3 style="margin-top:0; color:#38bdf8;">Yeni Kayıt</h3>
            <select id="tur">
                <option value="kisi">👤 Kişi</option>
                <option value="olay">📜 Olay</option>
            </select>
            <input id="isim" placeholder="İsim / Olay adı">
            <input id="dogum" placeholder="Miladi Tarih">
            <input id="dogumHicri" placeholder="Hicri Tarih">
            <input id="vefat" placeholder="Miladi Vefat">
            <input id="vefatHicri" placeholder="Hicri Vefat">
            <input id="aile" placeholder="Aile / Hanedan">
            <textarea id="bilgi" placeholder="Detaylı bilgi yazın..."></textarea>
            <button onclick="kaydet()">💾 SİSTEME KAYDET</button>
        </div>

        <div class="card">
            <div class="tabs">
                <div class="tab-btn active" onclick="tabAc('kayitlar')">📚 Kayıtlı Kişiler</div>
                <div class="tab-btn" onclick="tabAc('zaman')">📆 Zaman Çizelgesi</div>
                <div class="tab-btn" onclick="tabAc('soy')">🌳 Soy Ağacı</div>
            </div>

            <div id="kayitlar" class="tab-content active">
                <div id="listeAlani">
                    </div>
            </div>

            <div id="zaman" class="tab-content">
                <p>Zaman çizelgesi çok yakında eklenecek...</p>
            </div>

            <div id="soy" class="tab-content">
                <p>Soy ağacı modülü hazırlanıyor...</p>
            </div>
        </div>
    </div>

    <script>
        // Sekme Değiştirme Fonksiyonu
        function tabAc(id) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        // Kayıt ve Listeleme Fonksiyonu
        function kaydet() {
            const isim = document.getElementById('isim').value;
            const bilgi = document.getElementById('bilgi').value;
            const aile = document.getElementById('aile').value;

            if(!isim) { alert("Lütfen bir isim girin!"); return; }

            const listeAlani = document.getElementById('listeAlani');

            // Yeni bir kişi kartı oluşturma
            const yeniKayit = document.createElement('div');
            yeniKayit.className = 'kisi-ozet';
            yeniKayit.innerHTML = `
                <div class="kisi-baslik" onclick="detayAc(this)">
                    <span>${isim} (${aile})</span>
                    <span>▼</span>
                </div>
                <div class="kisi-detay">
                    ${bilgi}
                </div>
            `;

            listeAlani.prepend(yeniKayit); // En üste ekle
            
            // Formu temizle
            document.querySelectorAll('input, textarea').forEach(inpt => inpt.value = '');
        }

        // Tıklayınca Detay Açma Fonksiyonu
        function detayAc(eleman) {
            const detay = eleman.nextElementSibling;
            if (detay.style.display === "block") {
                detay.style.display = "none";
                eleman.querySelector('span:last-child').innerText = "▼";
            } else {
                detay.style.display = "block";
                eleman.querySelector('span:last-child').innerText = "▲";
            }
        }
    </script>

</body>
</html>
