<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASRI SAADET PORTALI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --nostalgia-brown: #5d4037; --bg: #fafaf9; --text: #1c1917; --accent: #b45309; --primary-font: 'Inter', sans-serif; }
        body { font-family: var(--primary-font); background: var(--bg); color: var(--text); margin: 0; padding: 0; scroll-behavior: smooth; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        header { background: white; border-bottom: 1px solid #e7e5e4; padding: 12px 0; position: sticky; top: 0; z-index: 1000; }
        nav { display: flex; justify-content: space-between; align-items: center; max-width: 1300px; margin: 0 auto; padding: 0 20px; }
        .brand { display: flex; align-items: center; gap: 18px; cursor: pointer; }
        .brand img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; }
        .brand span { font-size: 1.8rem; font-weight: 800; color: var(--nostalgia-brown); text-transform: uppercase; }
        
        .nav-links button { background: none; border: none; font-weight: 600; color: #57534e; cursor: pointer; font-size: 13px; text-transform: uppercase; margin-left: 15px; }
        .nav-links button:hover { color: var(--nostalgia-brown); }

        .tab-content { display: none; padding: 40px 0; }
        .tab-content.active { display: block; }

        /* Admin Paneli Gelişmiş */
        .admin-section { display: none; background: white; padding: 35px; border-radius: 20px; border: 2px solid var(--nostalgia-brown); margin-top: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .form-box { background: #fdfcfb; padding: 20px; border-radius: 12px; border: 1px solid #e7e5e4; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #d6d3d1; font-family: inherit; box-sizing: border-box; }
        .save-btn { background: var(--nostalgia-brown); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 700; width: 100%; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 700; margin-top: 20px; }

        /* Arşiv & Zaman Çizelgesi */
        .timeline-item { background: white; padding: 20px; border-radius: 12px; border-left: 5px solid var(--nostalgia-brown); margin-bottom: 15px; border: 1px solid #e7e5e4; }
        .timeline-row { display: flex; gap: 20px; padding: 12px; border-bottom: 1px solid #eee; align-items: center; }
        .year-label { font-weight: 800; color: var(--nostalgia-brown); min-width: 90px; }

        /* Mesaj Kutusu */
        .message-box { max-height: 400px; overflow-y: auto; background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .msg-card { background: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--accent); font-size: 0.9rem; }

        .archive-tabs { display: flex; gap: 15px; margin-bottom: 25px; border-bottom: 2px solid #eee; }
        .archive-tabs button { padding: 10px; background: none; border: none; cursor: pointer; font-weight: 700; color: #94a3b8; }
        .archive-tabs button.active { color: var(--nostalgia-brown); border-bottom: 3px solid var(--nostalgia-brown); }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="brand" onclick="location.reload()">
                <img src="https://i.imgur.com/mCaF9Dd.png" alt="ASP Logo">
                <span>Asrı Saadet Portalı</span>
            </div>
            <div class="nav-right">
                <div class="nav-links">
                    <button onclick="switchTab('archive')">Arşiv</button>
                    <button onclick="switchTab('time')">Zaman Çizelgesi</button>
                    <button onclick="switchTab('soy')">Soyağacı</button>
                    <button onclick="loginAdmin()" id="adminBtn" style="color:var(--accent); font-weight:800;">Yönetici</button>
                    <button onclick="logoutAdmin()" id="logoutNavBtn" style="display:none; color:#ef4444;">Çıkış</button>
                </div>
            </div>
        </nav>
    </header>

    <div id="homeView">
        <section style="text-align:center; padding:80px 20px; background:white;">
            <p class="hadis-text" style="font-size:26px; font-family:'Playfair Display'; font-style:italic;">"Ashabım, yıldızlar gibidir..."</p>
        </section>
    </div>

    <div class="container">
        <div id="adminPanel" class="admin-section">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="color:var(--nostalgia-brown)">Yönetim Merkezi</h2>
                <button class="logout-btn" onclick="logoutAdmin()">Panelden Çıkış Yap</button>
            </div>
            
            <div class="form-grid">
                <div class="form-box">
                    <h3>👤 Zat Kaydı</h3>
                    <input id="z_isim" placeholder="İsim">
                    <input id="z_anne" placeholder="Anne Adı">
                    <input id="z_baba" placeholder="Baba Adı">
                    <input id="z_es" placeholder="Eşi / Eşleri">
                    <div style="display:flex; gap:10px;">
                        <input id="z_hicri" placeholder="Doğum (H)">
                        <input id="z_vefat" placeholder="Vefat (H)">
                    </div>
                    <textarea id="z_bilgi" placeholder="Biyografi..." rows="3"></textarea>
                    <button class="save-btn" onclick="saveData('zatlar')">KAYDET</button>
                </div>

                <div class="form-box">
                    <h3>📜 Olay Kaydı</h3>
                    <input id="o_ad" placeholder="Olay Adı">
                    <input id="o_hicri" placeholder="Yıl (Hicri)">
                    <textarea id="o_bilgi" placeholder="Olay Detayı..." rows="3"></textarea>
                    <button class="save-btn" onclick="saveData('olaylar')">KAYDET</button>
                </div>
            </div>

            <div class="form-box" style="margin-top:20px;">
                <h3>📩 Gelen Mesajlar</h3>
                <div id="inbox" class="message-box">Mesajlar yükleniyor...</div>
            </div>
        </div>

        <div id="archive" class="tab-content">
            <div class="archive-tabs">
                <button id="tabZat" class="active" onclick="toggleArchive('zatlar')">Zatlar</button>
                <button id="tabOlay" onclick="toggleArchive('olaylar')">Olaylar</button>
            </div>
            <div id="archiveContent"></div>
        </div>

        <div id="time" class="tab-content">
            <h2 style="color:var(--nostalgia-brown)">⏳ Kronolojik Akış</h2>
            <div id="timelineContent"></div>
        </div>

        <div id="soy" class="tab-content">
            <h2 style="color:var(--nostalgia-brown)">🌳 Soyağacı ve Bağlar</h2>
            <div id="soyContent"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCrrD1XRInE3Er47ZRl28rUo_Pk7FZAyss",
            authDomain: "tarihizatlar.firebaseapp.com",
            projectId: "tarihizatlar",
            storageBucket: "tarihizatlar.firebasestorage.app",
            messagingSenderId: "930648787998",
            appId: "1:930648787998:web:db163d0f3811786610b20f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let zatlarData = [];
        let olaylarData = [];
        let currentArchiveTab = 'zatlar';

        function initData() {
            db.collection("zatlar").onSnapshot(s => { zatlarData = s.docs.map(d => d.data()); refreshUI(); });
            db.collection("olaylar").onSnapshot(s => { olaylarData = s.docs.map(d => d.data()); refreshUI(); });
        }

        function refreshUI() { renderArchive(); renderTimeline(); renderSoy(); }

        function renderArchive() {
            const container = document.getElementById('archiveContent');
            if(currentArchiveTab === 'zatlar') {
                container.innerHTML = zatlarData.map(i => `
                    <div class="timeline-item">
                        <h3 style="margin:0; color:var(--nostalgia-brown)">${i.isim}</h3>
                        <p style="font-size:0.85rem; color:#64748b"><b>H ${i.hicri || '?' } - ${i.vefat || '?'}</b></p>
                        <p style="font-size:0.9rem; color:#444">Anne: ${i.anne || '-'} | Baba: ${i.baba || '-'} | Eş: ${i.es || '-'}</p>
                        <p style="margin-top:10px;">${i.bilgi}</p>
                    </div>
                `).join('');
            } else {
                container.innerHTML = olaylarData.map(i => `
                    <div class="timeline-item"><h3>${i.isim}</h3><p>Hicri Yıl: ${i.hicri}</p><p>${i.bilgi}</p></div>
                `).join('');
            }
        }

        function renderTimeline() {
            const container = document.getElementById('timelineContent');
            const combined = [
                ...zatlarData.map(z => ({yil: parseInt(z.hicri) || 0, ad: z.isim, tip: 'Zat'})),
                ...olaylarData.map(o => ({yil: parseInt(o.hicri) || 0, ad: o.isim, tip: 'Olay'}))
            ].sort((a,b) => a.yil - b.yil);

            container.innerHTML = combined.map(i => `
                <div class="timeline-row">
                    <div class="year-label">H ${i.yil}</div>
                    <div><b>${i.ad}</b> <small style="color:#94a3b8">(${i.tip})</small></div>
                </div>
            `).join('');
        }

        function renderSoy() {
            const container = document.getElementById('soyContent');
            container.innerHTML = zatlarData.map(i => `
                <div class="timeline-item">
                    <h3 style="color:var(--nostalgia-brown); margin-bottom:5px;">${i.isim}</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; font-size:0.9rem;">
                        <div><b>Baba:</b> ${i.baba || 'Bilinmiyor'}</div>
                        <div><b>Anne:</b> ${i.anne || 'Bilinmiyor'}</div>
                        <div style="grid-column: span 2;"><b>Eş / Çocuklar:</b> ${i.es || 'Bilinmiyor'}</div>
                    </div>
                </div>
            `).join('');
        }

        async function saveData(type) {
            if(type === 'zatlar') {
                const d = {
                    isim: document.getElementById('z_isim').value,
                    anne: document.getElementById('z_anne').value,
                    baba: document.getElementById('z_baba').value,
                    es: document.getElementById('z_es').value,
                    hicri: document.getElementById('z_hicri').value,
                    vefat: document.getElementById('z_vefat').value,
                    bilgi: document.getElementById('z_bilgi').value
                };
                await db.collection("zatlar").add(d);
            } else {
                const d = { isim: document.getElementById('o_ad').value, hicri: document.getElementById('o_hicri').value, bilgi: document.getElementById('o_bilgi').value };
                await db.collection("olaylar").add(d);
            }
            alert("Kaydedildi.");
            document.querySelectorAll('input, textarea').forEach(e => e.value = "");
        }

        function loginAdmin() {
            if(prompt("Şifre:") === "130504") {
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('adminBtn').style.display = 'none';
                document.getElementById('logoutNavBtn').style.display = 'inline-block';
                loadMessages();
            }
        }

        function logoutAdmin() {
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminBtn').style.display = 'inline-block';
            document.getElementById('logoutNavBtn').style.display = 'none';
        }

        async function loadMessages() {
            const snap = await db.collection("mesajlar").get();
            document.getElementById('inbox').innerHTML = snap.docs.map(d => `<div class="msg-card"><b>${d.data().name}:</b> ${d.data().text}</div>`).join('') || "Mesaj yok.";
        }

        function toggleArchive(type) {
            currentArchiveTab = type;
            document.getElementById('tabZat').classList.toggle('active', type === 'zatlar');
            document.getElementById('tabOlay').classList.toggle('active', type === 'olaylar');
            renderArchive();
        }

        function switchTab(id) {
            document.getElementById('homeView').style.display = 'none';
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        initData();
    </script>
</body>
</html>
