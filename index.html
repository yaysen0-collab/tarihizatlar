<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARİHİ ZATLAR - BULUT ARŞİV</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .main-title { font-size: 2.5rem; font-weight: 800; color: #38bdf8; margin-bottom: 30px; letter-spacing: 3px; }
        .container { max-width: 1200px; width: 100%; display: grid; grid-template-columns: 380px 1fr; gap: 25px; }
        .card { background: #1e293b; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 4px; }
        input, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; margin-top: 10px; padding: 15px; border: none; border-radius: 12px; background: #0ea5e9; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0284c7; transform: translateY(-2px); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .tab-btn { background: #334155; color: #cbd5e1; padding: 10px 15px; border-radius: 10px; cursor: pointer; }
        .tab-btn.active { background: #38bdf8; color: #0f172a; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .kisi-ozet { background: #1e293b; margin-bottom: 10px; border-radius: 12px; border: 1px solid #334155; overflow: hidden; }
        .kisi-baslik { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .kisi-detay { padding: 15px; display: none; background: #0f172a; border-top: 1px solid #334155; }
        .age-badge { background: #0ea5e9; color: white; padding: 2px 8px; border-radius: 6px; font-size: 11px; }
        .timeline { border-left: 2px solid #38bdf8; margin-left: 20px; padding-left: 20px; }
        .timeline-item { position: relative; margin-bottom: 20px; background: #0f172a; padding: 10px; border-radius: 8px; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div class="main-title">TARİHİ ZATLAR</div>

    <div class="container">
        <div class="card">
            <h3 style="margin:0 0 15px 0; color:#38bdf8; text-align:center;">Bulut Kaydı</h3>
            <div class="input-group"><label>Kişi / Olay Adı</label><input id="isim"></div>
            <div class="input-group"><label>Doğum (H / M)</label><input id="dogum" placeholder="835 / 1432"></div>
            <div class="input-group"><label>Vefat (H / M)</label><input id="vefat" placeholder="886 / 1481"></div>
            <div class="input-group"><label>Aile / Unvan</label><input id="aile"></div>
            <div class="input-group"><label>Bilgiler</label><textarea id="bilgi"></textarea></div>
            <button onclick="bulutaKaydet()">☁️ BULUTA GÖNDER</button>
        </div>

        <div class="card">
            <div class="tabs">
                <div class="tab-btn active" onclick="tabAc('kayitlar', this)">📚 Arşiv</div>
                <div class="tab-btn" onclick="tabAc('zaman', this)">📆 Zaman Çizelgesi</div>
            </div>
            <div id="kayitlar" class="tab-content active"><div id="listeAlani">Yükleniyor...</div></div>
            <div id="zaman" class="tab-content"><div class="timeline" id="zamanAlani"></div></div>
        </div>
    </div>

    <script>
        // --- BURAYI FİREBASE EKRANINDAKİ BİLGİLERLE DOLDUR ---
        const firebaseConfig = {
            apiKey: "AIzaSyCrrD1XRInE3Er47ZRl28rUo_Pk7FZAyss" , 
            authDomain: "tarihizatlar.firebaseapp.com" , 
            projectId: "tarihizatlar" , 
            storageBucket: "tarihizatlar.firebasestorage.app" , 
            messagingSenderId: "1:930648787998:web:db163d0f3811786610b20f" , 
            appId: "G-N2DE9B17T0" 
        };
        // -----------------------------------------------------

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Verileri Buluttan Anlık Çekme
        db.collection("zatlar").onSnapshot((snapshot) => {
            verileriYukle(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        });

        async function bulutaKaydet() {
            const isim = document.getElementById('isim').value.trim();
            if(!isim) return;

            const yeniBilgi = document.getElementById('bilgi').value;
            const snapshot = await db.collection("zatlar").where("isim", "==", isim).get();

            if (!snapshot.empty) {
                // Varsa Üstüne Ekle
                const doc = snapshot.docs[0];
                await db.collection("zatlar").doc(doc.id).update({
                    bilgi: doc.data().bilgi + "\n---\n" + yeniBilgi,
                    dogum: document.getElementById('dogum').value || doc.data().dogum,
                    vefat: document.getElementById('vefat').value || doc.data().vefat,
                    aile: document.getElementById('aile').value || doc.data().aile
                });
            } else {
                // Yoksa Yeni Oluştur
                await db.collection("zatlar").add({
                    isim: isim,
                    dogum: document.getElementById('dogum').value,
                    vefat: document.getElementById('vefat').value,
                    aile: document.getElementById('aile').value,
                    bilgi: yeniBilgi,
                    tarih: Date.now()
                });
            }
            document.querySelectorAll('input, textarea').forEach(i => i.value = '');
        }

        function verileriYukle(arsiv) {
            const listeAlani = document.getElementById('listeAlani');
            const zamanAlani = document.getElementById('zamanAlani');
            listeAlani.innerHTML = '';
            zamanAlani.innerHTML = '';

            // Arşiv Listesi
            [...arsiv].sort((a,b) => b.tarih - a.tarih).forEach(veri => {
                const div = document.createElement('div');
                div.className = 'kisi-ozet';
                div.innerHTML = `
                    <div class="kisi-baslik" onclick="detayAc(this)">
                        <div><span style="color:#38bdf8; font-weight:bold;">${veri.isim}</span></div>
                        <span>▼</span>
                    </div>
                    <div class="kisi-detay">
                        <p><b>H/M:</b> ${veri.dogum} - ${veri.vefat}</p>
                        <p style="white-space:pre-wrap;">${veri.bilgi}</p>
                        <button style="background:#ef4444; width:auto; padding:5px 10px; font-size:11px;" onclick="sil('${veri.id}')">Kayıdı Sil</button>
                    </div>`;
                listeAlani.appendChild(div);
            });

            // Zaman Çizelgesi
            arsiv.sort((a,b) => (parseInt(a.dogum.split('/')[1]) || 0) - (parseInt(b.dogum.split('/')[1]) || 0))
            .forEach(veri => {
                const item = document.createElement('div');
                item.className = 'timeline-item';
                item.innerHTML = `<strong>${veri.dogum.split('/')[1] || '???'}</strong> - ${veri.isim}`;
                zamanAlani.appendChild(item);
            });
        }

        function sil(id) { if(confirm("Silinsin mi?")) db.collection("zatlar").doc(id).delete(); }
        function tabAc(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }
        function detayAc(el) { const d = el.nextElementSibling; d.style.display = d.style.display === "block" ? "none" : "block"; }
    </script>
</body>
</html>
