<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARİHİ ZATLAR - ARŞİV</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; width: 100%; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        /* Giriş Ekranı Tasarımı */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: var(--card); padding: 40px; border-radius: 25px; border: 2px solid var(--primary); text-align: center; width: 300px; }
        
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { padding: 12px 25px; border: none; border-radius: 12px; background: var(--primary); color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Panel Görünümleri */
        #adminPanel { display: none; margin-bottom: 30px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #334155; color: #cbd5e1; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: #0f172a; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .kisi-kart { background: var(--card); border: 1px solid #334155; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .admin-btn { background: #ef4444; color: white; padding: 5px 10px; font-size: 12px; margin-top: 10px; }
        #openLogin { position: fixed; bottom: 10px; right: 10px; background: transparent; color: #334155; font-size: 11px; border: none; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2 style="color: var(--primary)">Yönetici Girişi</h2>
            <input type="text" id="username" placeholder="Kullanıcı Adı">
            <input type="password" id="password" placeholder="Şifre">
            <button onclick="checkLogin()">Giriş Yap</button>
            <p><a href="#" onclick="closeLogin()" style="color: #64748b; text-decoration: none; font-size: 12px;">Vazgeç</a></p>
        </div>
    </div>

    <div class="container">
        <h1 style="text-align:center; color: var(--primary); letter-spacing: 2px;">TARİHİ ZATLAR</h1>

        <div id="adminPanel" class="card">
            <h3 style="margin-top:0">🛠️ Yeni Kayıt Ekle</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input id="isim" placeholder="Kişi Adı">
                <input id="aile" placeholder="Aile / Unvan">
                <input id="dogum" placeholder="Doğum (Örn: 1432)">
                <input id="vefat" placeholder="Vefat (Örn: 1481)">
            </div>
            <textarea id="bilgi" placeholder="Detaylı biyografi ve bilgiler..." rows="4"></textarea>
            <button onclick="saveToCloud()">💾 BULUTA KAYDET</button>
            <button onclick="logout()" style="background: #475569; margin-left:10px;">GÜVENLİ ÇIKIŞ</button>
        </div>

        <div class="tabs">
            <div class="tab-btn active" onclick="switchTab('list', this)">📚 Arşiv</div>
            <div class="tab-btn" onclick="switchTab('time', this)">📆 Zaman Çizelgesi</div>
            <div id="adminTabBtn" class="tab-btn" style="display:none" onclick="switchTab('admin', this)">⚙️ Yönetim</div>
        </div>

        <div id="list" class="tab-content active"><div id="listArea">Yükleniyor...</div></div>
        <div id="time" class="tab-content"><div id="timeArea"></div></div>
    </div>

    <button id="openLogin" onclick="showLogin()">Yönetici misiniz?</button>

    <script>
        // --- FIREBASE AYARLARINI BURAYA YAPIŞTIR ---
        const firebaseConfig = {
            apiKey: "AIzaSyCrrD1XRInE3Er47ZRl28rUo_Pk7FZAyss" , 
            authDomain: "tarihizatlar.firebaseapp.com" , 
            projectId: "tarihizatlar" , 
            storageBucket: "tarihizatlar.firebasestorage.app" , 
            messagingSenderId: "930648787998" ,  
            appId: "1:930648787998:web:db163d0f3811786610b20f" , 
        };
        // ------------------------------------------

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let isAdmin = false;

        // --- GİRİŞ KONTROLÜ ---
        function showLogin() { document.getElementById('loginScreen').style.display = 'flex'; }
        function closeLogin() { document.getElementById('loginScreen').style.display = 'none'; }

        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if(user === "ayris" && pass === "130504") {
                isAdmin = true;
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('openLogin').style.display = 'none';
                alert("Hoş geldin Öyküm! Editör yetkileri tanımlandı.");
                loadData(); 
            } else {
                alert("Hatalı kullanıcı adı veya şifre!");
            }
        }

        function logout() {
            location.reload(); // En güvenli çıkış sayfayı yenilemektir
        }

        // --- BULUT İŞLEMLERİ ---
        async function saveToCloud() {
            const isim = document.getElementById('isim').value;
            if(!isim) return;

            await db.collection("zatlar").add({
                isim: isim, aile: document.getElementById('aile').value,
                dogum: document.getElementById('dogum').value, vefat: document.getElementById('vefat').value,
                bilgi: document.getElementById('bilgi').value, timestamp: Date.now()
            });
            document.querySelectorAll('input, textarea').forEach(i => i.value = '');
        }

        function loadData() {
            db.collection("zatlar").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render(data);
            });
        }

        function render(data) {
            const listArea = document.getElementById('listArea');
            listArea.innerHTML = '';
            
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'kisi-kart';
                card.innerHTML = `
                    <h2 style="color:var(--primary); margin:0;">${item.isim}</h2>
                    <p style="color:#94a3b8; font-size:14px;">${item.dogum} - ${item.vefat} | ${item.aile}</p>
                    <p style="white-space:pre-wrap;">${item.bilgi}</p>
                    ${isAdmin ? `<button class="admin-btn" onclick="deleteItem('${item.id}')">Kaydı Sil</button>` : ''}
                `;
                listArea.appendChild(card);
            });
        }

        function deleteItem(id) { if(confirm("Bu kaydı kalıcı olarak silmek istediğine emin misin?")) db.collection("zatlar").doc(id).delete(); }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        loadData();
    </script>
</body>
</html>
