<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARİHİ ZATLAR - PROFESYONEL ARŞİV</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; width: 100%; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #334155; margin-bottom: 20px; }
        
        /* Giriş Paneli */
        #loginScreen { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.95); display:none; justify-content:center; align-items:center; z-index:1000; }
        .login-box { background: var(--card); padding: 30px; border-radius: 20px; border: 2px solid var(--primary); text-align: center; }

        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { padding: 12px 25px; border: none; border-radius: 12px; background: var(--primary); color: #0f172a; font-weight: bold; cursor: pointer; }

        /* Sekmeler */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: #334155; color: #cbd5e1; padding: 10px 20px; border-radius: 10px; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: var(--primary); color: #0f172a; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Kartlar ve Listeler */
        .kisi-kart { background: var(--card); border: 1px solid #334155; padding: 20px; border-radius: 15px; margin-bottom: 15px; position: relative; }
        .age-badge { position: absolute; top: 20px; right: 20px; background: var(--primary); color: #0f172a; padding: 4px 10px; border-radius: 8px; font-weight: bold; font-size: 14px; }
        .soy-grup { border-left: 3px solid var(--primary); padding-left: 15px; margin-bottom: 20px; }
        .soy-aile-adi { color: var(--primary); font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; display: block; }
        
        #adminPanel { display: none; }
        #openLogin { position: fixed; bottom: 10px; right: 10px; opacity: 0.3; background: none; color: white; border: none; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2 style="color:var(--primary)">Yönetici Girişi</h2>
            <input type="text" id="username" placeholder="Kullanıcı Adı">
            <input type="password" id="password" placeholder="Şifre">
            <button onclick="checkLogin()">Giriş Yap</button>
            <button onclick="closeLogin()" style="background:#475569; margin-top:10px;">İptal</button>
        </div>
    </div>

    <div class="container">
        <h1 style="text-align:center; color: var(--primary);">TARİHİ ZATLAR</h1>

        <div id="adminPanel" class="card">
            <h3 style="margin-top:0; color:var(--primary)">🛠️ Yönetici Kayıt Paneli</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input id="isim" placeholder="İsim">
                <input id="aile" placeholder="Aile (Örn: Osmanlılar)">
                <input id="dogum" placeholder="Doğum (Sadece Sayı, Örn: 1432)">
                <input id="vefat" placeholder="Vefat (Sadece Sayı, Örn: 1481)">
            </div>
            <textarea id="bilgi" placeholder="Bilgiler..." rows="3"></textarea>
            <button onclick="saveToCloud()">💾 KAYDET</button>
            <button onclick="location.reload()" style="background:#475569">ÇIKIŞ</button>
        </div>

        <div class="tabs">
            <div class="tab-btn active" onclick="switchTab('list', this)">📚 Arşiv</div>
            <div class="tab-btn" onclick="switchTab('time', this)">📆 Zaman Çizelgesi</div>
            <div class="tab-btn" onclick="switchTab('soy', this)">🌳 Soy Ağacı</div>
        </div>

        <div id="list" class="tab-content active"><div id="listArea">Yükleniyor...</div></div>
        <div id="time" class="tab-content"><div id="timeArea"></div></div>
        <div id="soy" class="tab-content"><div id="soyArea"></div></div>
    </div>

    <button id="openLogin" onclick="showLogin()">Yönetici Girişi</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCrrD1XRInE3Er47ZRl28rUo_Pk7FZAyss" , 
            authDomain: "tarihizatlar.firebaseapp.com" , 
            projectId: "tarihizatlar" , 
            storageBucket: "tarihizatlar.firebasestorage.app" ,
            messagingSenderId: "930648787998" , 
            appId: "1:930648787998:web:db163d0f3811786610b20f" , 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let isAdmin = false;

        function showLogin() { document.getElementById('loginScreen').style.display = 'flex'; }
        function closeLogin() { document.getElementById('loginScreen').style.display = 'none'; }
        function checkLogin() {
            if(document.getElementById('username').value === "ayris" && document.getElementById('password').value === "130504") {
                isAdmin = true;
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('openLogin').style.display = 'none';
                alert("Hoş geldin Ayris İyi Çalışmalar!");
                loadData();
            } else { alert("Hatalı Giriş!"); }
        }

        async function saveToCloud() {
            const isim = document.getElementById('isim').value;
            if(!isim) return;
            await db.collection("zatlar").add({
                isim: isim, aile: document.getElementById('aile').value || "Bilinmiyor",
                dogum: document.getElementById('dogum').value, vefat: document.getElementById('vefat').value,
                bilgi: document.getElementById('bilgi').value, timestamp: Date.now()
            });
            document.querySelectorAll('input, textarea').forEach(i => i.value = '');
        }

        function loadData() {
            db.collection("zatlar").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render(data);
            });
        }

        function render(data) {
            const listArea = document.getElementById('listArea');
            const timeArea = document.getElementById('timeArea');
            const soyArea = document.getElementById('soyArea');
            listArea.innerHTML = ''; timeArea.innerHTML = ''; soyArea.innerHTML = '';

            // Yaş Hesaplama ve Arşiv
            data.forEach(item => {
                let yasText = "";
                if(item.dogum && item.vefat) {
                    const yas = parseInt(item.vefat) - parseInt(item.dogum);
                    yasText = !isNaN(yas) ? yas + " Yaşında" : "";
                }

                const card = document.createElement('div');
                card.className = 'kisi-kart';
                card.innerHTML = `
                    ${yasText ? `<span class="age-badge">${yasText}</span>` : ''}
                    <h2 style="margin:0; color:var(--primary)">${item.isim}</h2>
                    <p style="color:#94a3b8; font-size:14px;">${item.dogum} - ${item.vefat} | ${item.aile}</p>
                    <p>${item.bilgi}</p>
                    ${isAdmin ? `<button style="background:#ef4444; border:none; color:white; padding:5px; border-radius:5px; cursor:pointer;" onclick="deleteItem('${item.id}')">Kaydı Sil</button>` : ''}
                `;
                listArea.appendChild(card);
            });

            // Zaman Çizelgesi (Y
