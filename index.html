```html
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarih Arşivi</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #eef3ff, #dbe8ff);
    margin: 0;
    padding: 30px;
}

.container {
    max-width: 1100px;
    margin: auto;
    display: grid;
    grid-template-columns: 350px 1fr;
    gap: 20px;
}

.card {
    background: white;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

h1 {
    text-align: center;
    color: #1f3c88;
    margin-bottom: 25px;
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #d9d9d9;
    font-size: 14px;
    box-sizing: border-box;
}

textarea {
    min-height: 100px;
}

button {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: #2563eb;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #1d4ed8;
    transform: translateY(-2px);
}

.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.tab-btn {
    background: #e6eeff;
    color: #1f3c88;
    border-radius: 10px;
    padding: 10px 18px;
    cursor: pointer;
    font-weight: bold;
}

.tab-btn.active {
    background: #2563eb;
    color: white;
}

.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

.kisi-card {
    background: #f7f9fc;
    border-radius: 14px;
    padding: 15px;
    margin-bottom: 12px;
    border-left: 5px solid #2563eb;
}

.timeline {
    border-left: 4px solid #2563eb;
    padding-left: 25px;
    margin-left: 10px;
}

.timeline-item {
    position: relative;
    margin-bottom: 25px;
    background: #f8fbff;
    padding: 12px;
    border-radius: 12px;
}

.timeline-item::before {
    content: '';
    width: 14px;
    height: 14px;
    background: #2563eb;
    border-radius: 50%;
    position: absolute;
    left: -34px;
    top: 18px;
}

details {
    background: #f7f9fc;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
}

summary {
    cursor: pointer;
    font-size: 17px;
}
</style>
</head>
<body>

<h1>📜 Tarih Arşivi Sistemi</h1>

<div class="container">

<div class="card">

<select id="tur">
  <option value="kisi">👤 Kişi</option>
  <option value="olay">📜 Olay</option>
</select>

<input id="isim" placeholder="İsim / Olay adı">
<input id="dogum" placeholder="Miladi Tarih">
<input id="dogumHicri" placeholder="Hicri Tarih">
<input id="vefat" placeholder="Miladi Vefat">
<input id="vefatHicri" placeholder="Hicri Vefat">
<input id="aile" placeholder="Aile / Hanedan">
<textarea id="bilgi" placeholder="Bilgi yaz..."></textarea>

<button>💾 Kaydet</button>

</div>

<div class="card">

<div class="tabs">
  <div class="tab-btn active" onclick="tabAc('kayitlar')">📚 Kayıtlar</div>
  <div class="tab-btn" onclick="tabAc('isimler')">📝 İsimler</div>
  <div class="tab-btn" onclick="tabAc('zaman')">📆 Zaman Çizelgesi</div>
  <div class="tab-btn" onclick="tabAc('soy')">🌳 Soy Ağacı</div>
</div>

<div id="kayitlar" class="tab-content active">
  <!-- Kayıtlar burada otomatik görünecek -->
</div>

<div id="isimler" class="tab-content"> class="tab-content">
  <!-- İsimler burada otomatik listelenecek -->
</div>

<div id="zaman" class="tab-content">
  <div class="timeline">
    <!-- Zaman çizelgesi burada otomatik oluşacak -->
  </div>
</div>

<div id="soy" class="tab-content"> class="tab-content">
  <!-- Soy ağacı burada otomatik oluşacak -->
</div>

</div>

</div>

<script>
function tabAc(id) {
  document.querySelectorAll('.tab-content').forEach(tab => {
    tab.classList.remove('active');
  });

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('active');
  });

  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}
</script>

</body>
</html>
