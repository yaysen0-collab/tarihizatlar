<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARİHİ ZATLAR</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #38bdf8;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            margin-bottom: 30px;
            letter-spacing: 3px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 25px;
        }

        .card {
            background: #1e293b;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #334155;
            height: fit-content;
        }

        /* FORM */
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 4px; }
        input, textarea {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155;
            background: #0f172a; color: white; font-size: 14px; box-sizing: border-box;
        }
        textarea { min-height: 100px; resize: vertical; }

        button {
            width: 100%; margin-top: 10px; padding: 15px; border: none;
            border-radius: 12px; background: #0ea5e9; color: white;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #0284c7; transform: translateY(-2px); }

        /* SEKMELER */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .tab-btn {
            background: #334155; color: #cbd5e1; padding: 10px 15px; border-radius: 10px;
            cursor: pointer; font-size: 14px; transition: 0.3s;
        }
        .tab-btn.active { background: #38bdf8; color: #0f172a; font-weight: bold; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* KAYIT KARTLARI */
        .kisi-ozet { background: #1e293b; margin-bottom: 10px; border-radius: 12px; border: 1px solid #334155; overflow: hidden; }
        .kisi-baslik { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .kisi-detay { padding: 15px; display: none; background: #0f172a; border-top: 1px solid #334155; }
        .name-main { font-weight: bold; color: #38bdf8; }
        .age-badge { background: #0ea5e9; color: white; padding: 2px 8px; border-radius: 6px; font-size: 11px; }

        /* ZAMAN ÇİZELGESİ TASARIMI */
        .timeline { border-left: 2px solid #38bdf8; margin-left: 20px; padding-left: 20px; }
        .timeline-item { position: relative; margin-bottom: 20px; background: #0f172a; padding: 10px; border-radius: 8px; border: 1px solid #334155; }
        .timeline-item::before {
            content: ''; position: absolute; left: -31px; top: 15px;
            width: 16px; height: 16px; background: #38bdf8; border-radius: 50%;
        }

        .delete-btn { background: #ef4444; padding: 5px 10px; font-size: 11px; width: auto; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="main-title">TARİHİ ZATLAR</div>

    <div class="container">
        <div class="card">
            <h3 style="margin:0 0 15px 0; color:#38bdf8; text-align:center;">Yeni Kayıt</h3>
            <div class="input-group"><label>Kişi / Olay Adı</label><input id="isim"></div>
            <div class="input-group"><label>Doğum (H / M)</label><input id="dogum" placeholder="Örn: 835 / 1432"></div>
            <div class="input-group"><label>Vefat (H / M)</label><input id="vefat" placeholder="Örn: 886 / 1481"></div>
            <div class="input-group"><label>Aile / Unvan</label><input id="aile"></div>
            <div class="input-group"><label>Bilgiler</label><textarea id="bilgi"></textarea></div>
            <button onclick="kaydet()">💾 SİSTEME EKLE</button>
        </div>

        <div class="card">
            <div class="tabs">
                <div class="tab-btn active" onclick="tabAc('kayitlar', this)">📚 Arşiv</div>
                <div class="tab-btn" onclick="tabAc('zaman', this)">📆 Zaman Çizelgesi</div>
                <div class="tab-btn" onclick="tabAc('soy', this)">🌳 Soy Ağacı</div>
            </div>

            <div id="kayitlar" class="tab-content active">
                <div id="listeAlani"></div>
            </div>

            <div id="zaman" class="tab-content">
                <div class="timeline" id="zamanAlani"></div>
            </div>

            <div id="soy" class="tab-content">
                <p style="text-align:center; color:#94a3b8;">Soy ağacı görselleştirme modülü geliştirme aşamasındadır.</p>
            </div>
        </div>
    </div>

    <script>
        window.onload = verileriYukle;

        function tabAc(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function kaydet() {
            const isim = document.getElementById('isim').value;
            if(!isim) return;

            const yeniVeri = {
                id: Date.now(),
                isim: isim,
                dogum: document.getElementById('dogum').value,
                vefat: document.getElementById('vefat').value,
                aile: document.getElementById('aile').value,
                bilgi: document.getElementById('bilgi').value
            };

            let arsiv = JSON.parse(localStorage.getItem('tarihArsivi')) || [];
            arsiv.push(yeniVeri);
            localStorage.setItem('tarihArsivi', JSON.stringify(arsiv));

            verileriYukle();
            document.querySelectorAll('input, textarea').forEach(i => i.value = '');
        }

        function verileriYukle() {
            const listeAlani = document.getElementById('listeAlani');
            const zamanAlani = document.getElementById('zamanAlani');
            listeAlani.innerHTML = '';
            zamanAlani.innerHTML = '';

            let arsiv = JSON.parse(localStorage.getItem('tarihArsivi')) || [];

            // 1. Arşiv Listesi (En yeni en üstte)
            [...arsiv].reverse().forEach(veri => {
                let yas = hesaplaYas(veri.dogum, veri.vefat);
                const div = document.createElement('div');
                div.className = 'kisi-ozet';
                div.innerHTML = `
                    <div class="kisi-baslik" onclick="detayAc(this)">
                        <div><span class="name-main">${veri.isim}</span> <small style="color:#94a3b8">(${veri.aile})</small></div>
                        <div><span class="age-badge">${yas}</span> <span>▼</span></div>
                    </div>
                    <div class="kisi-detay">
                        <p><b>Doğum/Vefat:</b> ${veri.dogum} / ${veri.vefat}</p>
                        <p style="white-space:pre-wrap;">${veri.bilgi}</p>
                        <button class="delete-btn" onclick="sil(${veri.id})">Sil</button>
                    </div>`;
                listeAlani.appendChild(div);
            });

            // 2. Zaman Çizelgesi (Tarihe göre sıralı)
            arsiv.sort((a, b) => {
                let yilA = parseInt(a.dogum.split('/')[1]) || 0;
                let yilB = parseInt(b.dogum.split('/')[1]) || 0;
                return yilA - yilB;
            }).forEach(veri => {
                const item = document.createElement('div');
                item.className = 'timeline-item';
                item.innerHTML = `<strong>${veri.dogum.split('/')[1] || 'Bilinmiyor'}</strong> - ${veri.isim}`;
                zamanAlani.appendChild(item);
            });
        }

        function hesaplaYas(d, v) {
            try {
                let dY = parseInt(d.split('/')[1]);
                let vY = parseInt(v.split('/')[1]);
                return (dY && vY) ? (vY - dY) + " Yıl" : "---";
            } catch { return "---"; }
        }

        function sil(id) {
            if(confirm("Bu kaydı silmek istediğinize emin misiniz?")) {
                let arsiv = JSON.parse(localStorage.getItem('tarihArsivi')) || [];
                arsiv = arsiv.filter(item => item.id !== id);
                localStorage.setItem('tarihArsivi', JSON.stringify(arsiv));
                verileriYukle();
            }
