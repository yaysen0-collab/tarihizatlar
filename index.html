<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARİHİ ZATLAR</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #38bdf8;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            margin-bottom: 30px;
            letter-spacing: 3px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 25px;
        }

        .card {
            background: #1e293b;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #334155;
            height: fit-content;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 5px; margin-left: 5px; }

        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea { min-height: 120px; resize: vertical; }

        button {
            width: 100%;
            margin-top: 10px;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #0ea5e9;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #0284c7; transform: translateY(-2px); }

        .kisi-ozet {
            background: #1e293b;
            margin-bottom: 12px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .kisi-baslik {
            padding: 18px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .name-area { display: flex; flex-direction: column; }
        .name-main { font-weight: bold; color: #38bdf8; font-size: 17px; }
        .name-sub { font-size: 12px; color: #94a3b8; }

        .kisi-detay {
            padding: 20px;
            display: none;
            background: #0f172a;
            border-top: 1px solid #334155;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .info-label { color: #38bdf8; font-weight: bold; display: block; font-size: 12px; }
        .bio-text { line-height: 1.6; color: #cbd5e1; white-space: pre-wrap; }

        .age-badge {
            background: #0ea5e9;
            color: white;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
        }

        .delete-btn {
            background: #ef4444;
            padding: 5px 10px;
            font-size: 11px;
            width: auto;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="main-title">TARİHİ ZATLAR</div>

    <div class="container">
        <div class="card">
            <h3 style="margin:0 0 20px 0; color:#38bdf8; text-align:center;">Yeni Kayıt Ekle</h3>
            <div class="input-group"><label>Kişi / Olay Adı</label><input id="isim"></div>
            <div class="input-group"><label>Doğum (H / M)</label><input id="dogum"></div>
            <div class="input-group"><label>Vefat (H / M)</label><input id="vefat"></div>
            <div class="input-group"><label>Aile / Unvan</label><input id="aile"></div>
            <div class="input-group"><label>Detaylar</label><textarea id="bilgi"></textarea></div>
            <button onclick="kaydet()">💾 LİSTEYE EKLE</button>
        </div>

        <div class="card">
            <h3 style="margin-top:0;">📜 Kayıtlı Arşiv</h3>
            <div id="listeAlani"></div>
        </div>
    </div>

    <script>
        // Sayfa yüklendiğinde eski verileri getir
        window.onload = function() {
            verileriYukle();
        };

        function kaydet() {
            const yeniVeri = {
                id: Date.now(),
                isim: document.getElementById('isim').value,
                dogum: document.getElementById('dogum').value,
                vefat: document.getElementById('vefat').value,
                aile: document.getElementById('aile').value,
                bilgi: document.getElementById('bilgi').value
            };

            if(!yeniVeri.isim) return;

            // Mevcut verileri al, yenisini ekle ve kaydet
            let arsiv = JSON.parse(localStorage.getItem('tarihArsivi')) || [];
            arsiv.push(yeniVeri);
            localStorage.setItem('tarihArsivi', JSON.stringify(arsiv));

            verileriYukle();
            document.querySelectorAll('input, textarea').forEach(i => i.value = '');
        }

        function verileriYukle() {
            const listeAlani = document.getElementById('listeAlani');
            listeAlani.innerHTML = '';
            let arsiv = JSON.parse(localStorage.getItem('tarihArsivi')) || [];

            arsiv.reverse().forEach(veri => {
                let yas = "Bilinmiyor";
                try {
                    const dYil = parseInt(veri.dogum.split('/')[1]);
                    const vYil = parseInt(veri.vefat.split('/')[1]);
                    if(dYil && vYil) yas = (vYil - dYil) + " Yıl";
                } catch(e) {}

                const div = document.createElement('div');
                div.className = 'kisi-ozet';
                div.innerHTML = `
                    <div class="kisi-baslik" onclick="detayAc(this)">
                        <div class="name-area">
                            <span class="name-main">${veri.isim}</span>
                            <span class="name-sub">${veri.aile}</span>
                        </div>
                        <div>
                            <span class="age-badge">${yas}</span>
                            <span style="margin-left:10px;">▼</span>
                        </div>
                    </div>
                    <div class="kisi-detay">
                        <div class="info-grid">
                            <div><span class="info-label">Doğum</span><span>${veri.dogum}</span></div>
                            <div><span class="info-label">Vefat</span><span>${veri.vefat}</span></div>
                        </div>
                        <div class="bio-text">${veri.bilgi}</div>
                        <button class="delete-btn" onclick="sil(${veri.id})">Kayıdı Sil</button>
                    </div>
                `;
                listeAlani.appendChild(div);
            });
        }

        function sil(id) {
            let arsiv = JSON.parse(localStorage.getItem('tarihArsivi')) || [];
            arsiv = arsiv.filter(item => item.id !== id);
            localStorage.setItem('tarihArsivi', JSON.stringify(arsiv));
            verileriYukle();
        }

        function detayAc(eleman) {
            const detay = eleman.nextElementSibling;
            detay.style.display = detay.style.display === "block" ? "none" : "block";
        }
    </script>
</body>
</html>
