<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARİHİ ZATLAR - ŞECERE VE ARŞİV</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; width: 100%; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #334155; margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { padding: 12px 25px; border: none; border-radius: 12px; background: var(--primary); color: #0f172a; font-weight: bold; cursor: pointer; margin-right: 5px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; }
        .tab-btn { background: #334155; color: #cbd5e1; padding: 10px 20px; border-radius: 10px; cursor: pointer; border: none; }
        .tab-btn.active { background: var(--primary); color: #0f172a; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .kisi-kart { background: var(--card); border: 1px solid #334155; padding: 20px; border-radius: 15px; margin-bottom: 15px; position: relative; }
        .timeline-item { border-left: 3px solid var(--primary); padding-left: 20px; margin-bottom: 15px; position: relative; }
        .timeline-item::before { content: ''; position: absolute; left: -8px; top: 8px; width: 13px; height: 13px; background: var(--primary); border-radius: 50%; }
        .badge { font-size: 11px; padding: 3px 8px; border-radius: 5px; background: #334155; color: var(--primary); margin-right: 5px; }
        #loginScreen { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); display:none; justify-content:center; align-items:center; z-index:9999; }
        #adminPanel { display: none; }
        #openLogin { position: fixed; bottom: 10px; right: 10px; opacity: 0.2; background: none; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="card" style="width: 320px; text-align: center;">
            <h2 style="color:var(--primary)">Yönetici Girişi</h2>
            <input type="text" id="username" placeholder="Kullanıcı Adı">
            <input type="password" id="password" placeholder="Şifre">
            <button onclick="checkLogin()" style="width:100%">Giriş Yap</button>
            <p onclick="closeLogin()" style="cursor:pointer; font-size:12px; margin-top:15px; color:#94a3b8;">Vazgeç</p>
        </div>
    </div>

    <div class="container">
        <h1 style="text-align:center; color: var(--primary);">TARİHİ ZATLAR VE ŞECERE</h1>

        <div id="adminPanel" class="card">
            <h3 id="panelTitle" style="color:var(--primary); margin-top:0;">🛠️ Yeni Kayıt Ekle</h3>
            <input id="docId" type="hidden"> <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input id="isim" placeholder="İsim (Örn: I. Osman)">
                <input id="aile" placeholder="Aile / Soy (Örn: Osmanlılar)">
                <input id="dogum" placeholder="Doğum (H/M Yılı)">
                <input id="vefat" placeholder="Vefat (H/M Yılı)">
                <input id="baba" placeholder="Baba Adı (Bağlantı İçin)">
                <input id="es" placeholder="Eş Adı">
                <select id="cinsiyet">
                    <option value="Erkek">Erkek</option>
                    <option value="Kadın">Kadın</option>
                </select>
            </div>
            <textarea id="bilgi" placeholder="Detaylı Bilgi ve Notlar..." rows="3"></textarea>
            <button id="saveBtn" onclick="saveToCloud()">💾 KAYDET</button>
            <button onclick="cancelEdit()" style="background:#475569; color:white;">TEMİZLE / İPTAL</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('list', this)">📚 Arşiv</button>
            <button class="tab-btn" onclick="switchTab('time', this)">📆 Zaman Çizelgesi</button>
            <button class="tab-btn" onclick="switchTab('soy', this)">🌳 Şecere / Soy</button>
        </div>

        <div id="list" class="tab-content active"><div id="listArea">Yükleniyor...</div></div>
        <div id="time" class="tab-content"><div id="timeArea"></div></div>
        <div id="soy" class="tab-content"><div id="soyArea"></div></div>
    </div>

    <button id="openLogin" onclick="showLogin()">Giriş</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCrrD1XRInE3Er47ZRl28rUo_Pk7FZAyss",
            authDomain: "tarihizatlar.firebaseapp.com",
            projectId: "tarihizatlar",
            storageBucket: "tarihizatlar.firebasestorage.app",
            messagingSenderId: "930648787998",
            appId: "1:930648787998:web:db163d0f3811786610b20f",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let isAdmin = false;

        function showLogin() { document.getElementById('loginScreen').style.display = 'flex'; }
        function closeLogin() { document.getElementById('loginScreen').style.display = 'none'; }
        
        function checkLogin() {
            if(document.getElementById('username').value === "ayris" && document.getElementById('password').value === "130504") {
                isAdmin = true;
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('openLogin').style.display = 'none';
                loadData();
            } else { alert("Hatalı!"); }
        }

        async function saveToCloud() {
            const data = {
                isim: document.getElementById('isim').value,
                aile: document.getElementById('aile').value || "Bilinmiyor",
                dogum: document.getElementById('dogum').value,
                vefat: document.getElementById('vefat').value,
                baba: document.getElementById('baba').value,
                es: document.getElementById('es').value,
                cinsiyet: document.getElementById('cinsiyet').value,
                bilgi: document.getElementById('bilgi').value,
                "zaman damgası": Date.now()
            };

            const docId = document.getElementById('docId').value;
            if(docId) {
                await db.collection("zatlar").doc(docId).update(data);
                alert("Güncellendi!");
            } else {
                await db.collection("zatlar").add(data);
                alert("Kaydedildi!");
            }
            cancelEdit();
        }

        function editItem(id, data) {
            document.getElementById('panelTitle').innerText = "📝 Kaydı Düzenle";
            document.getElementById('docId').value = id;
            document.getElementById('isim').value = data.isim;
            document.getElementById('aile').value = data.aile;
            document.getElementById('dogum').value = data.dogum;
            document.getElementById('vefat').value = data.vefat;
            document.getElementById('baba').value = data.baba || '';
            document.getElementById('es').value = data.es || '';
            document.getElementById('cinsiyet').value = data.cinsiyet;
            document.getElementById('bilgi').value = data.bilgi;
            window.scrollTo(0,0);
        }

        function cancelEdit() {
            document.getElementById('panelTitle').innerText = "🛠️ Yeni Kayıt Ekle";
            document.getElementById('docId').value = '';
            document.querySelectorAll('input, textarea').forEach(i => i.value = '');
        }

        function loadData() {
            db.collection("zatlar").onSnapshot((snapshot) => {
                const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render(data);
            });
        }

        function render(data) {
            const listArea = document.getElementById('listArea');
            const timeArea = document.getElementById('timeArea');
            const soyArea = document.getElementById('soyArea');
            listArea.innerHTML = ''; timeArea.innerHTML = ''; soyArea.innerHTML = '';

            // --- 1. ARŞİV VE DÜZENLEME ---
            data.sort((a,b) => b["zaman damgası"] - a["zaman damgası"]).forEach(item => {
                const card = document.createElement('div');
                card.className = 'kisi-kart';
                card.innerHTML = `
                    <h2 style="margin:0; color:var(--primary)">${item.isim}</h2>
                    <p style="font-size:14px; color:#94a3b8;">H/M: ${item.dogum} - ${item.vefat} | ${item.aile}</p>
                    <p style="white-space:pre-wrap;">${item.bilgi}</p>
                    ${isAdmin ? `<button onclick='editItem("${item.id}", ${JSON.stringify(item)})'>Düzenle</button>
                                 <button style="background:#ef4444; color:white;" onclick="deleteItem('${item.id}')">Sil</button>` : ''}
                `;
                listArea.appendChild(card);
            });

            // --- 2. ZAMAN ÇİZELGESİ ---
            [...data].sort((a,b) => parseInt(a.dogum) - parseInt(b.dogum)).forEach(item => {
                timeArea.innerHTML += `<div class="timeline-item"><b>H/M ${item.dogum}</b>: ${item.isim} (${item.vefat ? 'Vefat: H/M '+item.vefat : 'Devam Ediyor'})</div>`;
            });

            // --- 3. AKILLI ŞECERE ---
            const aileler = {};
            data.forEach(i => { if(!aileler[i.aile]) aileler[i.aile] = []; aileler[i.aile].push(i); });

            for(let aileAdi in aileler) {
                let soyHTML = `<div class="card"><h2 style="color:var(--primary); border-bottom:1px solid #334155;">🌳 ${aileAdi}</h2>`;
                
                const kisiler = aileler[aileAdi];
                const babalar = kisiler.filter(k => !k.baba); // Ana kökler

                babalar.forEach(ata => {
                    soyHTML += buildTree(ata, kisiler);
                });
                
                soyHTML += `</div>`;
                soyArea.innerHTML += soyHTML;
            }
        }

        function buildTree(kisi, havuz) {
            let html = `<div style="margin-left:20px; padding:10px; border-left:1px dashed var(--primary);">
                <b style="color:white;">● ${kisi.isim}</b> <span class="badge">1. Derece</span>
                ${kisi.es ? `<br><span style="color:#94a3b8; font-size:12px; margin-left:15px;">💍 Eşi: ${kisi.es} (Kayın Hısımlığı)</span>` : ''}`;
            
            const cocuklar = havuz.filter(k => k.baba === kisi.isim);
            cocuklar.sort((a,b) => (a.cinsiyet === 'Erkek' ? -1 : 1)); // Önce erkekler (oğullar), sonra kızlar

            cocuklar.forEach(cocuk => {
                html += buildTree(cocuk, havuz);
            });

            html += `</div>`;
            return html;
        }

        function deleteItem(id) { if(confirm("Kalıcı olarak silinecek?")) db.collection("zatlar").doc(id).delete(); }
        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }
        loadData();
    </script>
</body>
</html>
